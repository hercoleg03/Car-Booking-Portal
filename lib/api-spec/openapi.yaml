openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Gestione Prenotazioni Concessionaria
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vetture
    description: Gestione vetture (inventario)
  - name: clienti
    description: Gestione clienti
  - name: prenotazioni
    description: Gestione prenotazioni vetture
  - name: contratti
    description: Gestione contratti/documenti
  - name: dashboard
    description: Statistiche e riepiloghi
  - name: manutenzioni
    description: Gestione manutenzioni veicoli
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vetture:
    get:
      operationId: listVetture
      tags: [vetture]
      summary: Lista vetture
      parameters:
        - name: carburante
          in: query
          schema:
            type: ["string", "null"]
        - name: stato
          in: query
          schema:
            type: ["string", "null"]
        - name: marca
          in: query
          schema:
            type: ["string", "null"]
        - name: disponibile
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Lista vetture
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vettura"
    post:
      operationId: createVettura
      tags: [vetture]
      summary: Crea nuova vettura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVetturaBody"
      responses:
        "201":
          description: Vettura creata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vettura"

  /vetture/{id}:
    get:
      operationId: getVettura
      tags: [vetture]
      summary: Dettaglio vettura
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vettura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vettura"
        "404":
          description: Not found
    patch:
      operationId: updateVettura
      tags: [vetture]
      summary: Aggiorna vettura
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVetturaBody"
      responses:
        "200":
          description: Vettura aggiornata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vettura"
        "404":
          description: Not found
    delete:
      operationId: deleteVettura
      tags: [vetture]
      summary: Elimina vettura
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminata

  /vetture/{id}/storico:
    get:
      operationId: getVetturaStorico
      tags: [vetture]
      summary: Storico prenotazioni e contratti di una vettura
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Storico vettura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VetturaStorico"

  /vetture/{id}/manutenzioni:
    get:
      operationId: getVetturaManutenzioni
      tags: [manutenzioni]
      summary: Lista manutenzioni di una vettura
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista manutenzioni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Manutenzione"

  /manutenzioni:
    get:
      operationId: listManutenzioni
      tags: [manutenzioni]
      summary: Lista manutenzioni
      parameters:
        - name: vetturaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: tipo
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Lista manutenzioni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Manutenzione"
    post:
      operationId: createManutenzione
      tags: [manutenzioni]
      summary: Crea nuova manutenzione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManutenzioneBody"
      responses:
        "201":
          description: Manutenzione creata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manutenzione"

  /manutenzioni/{id}:
    get:
      operationId: getManutenzione
      tags: [manutenzioni]
      summary: Dettaglio manutenzione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Manutenzione
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manutenzione"
        "404":
          description: Not found
    patch:
      operationId: updateManutenzione
      tags: [manutenzioni]
      summary: Aggiorna manutenzione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateManutenzioneBody"
      responses:
        "200":
          description: Manutenzione aggiornata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manutenzione"
        "404":
          description: Not found
    delete:
      operationId: deleteManutenzione
      tags: [manutenzioni]
      summary: Elimina manutenzione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminata

  /clienti:
    get:
      operationId: listClienti
      tags: [clienti]
      summary: Lista clienti
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Lista clienti
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cliente"
    post:
      operationId: createCliente
      tags: [clienti]
      summary: Crea nuovo cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClienteBody"
      responses:
        "201":
          description: Cliente creato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"

  /clienti/{id}:
    get:
      operationId: getCliente
      tags: [clienti]
      summary: Dettaglio cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "404":
          description: Not found
    patch:
      operationId: updateCliente
      tags: [clienti]
      summary: Aggiorna cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClienteBody"
      responses:
        "200":
          description: Cliente aggiornato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "404":
          description: Not found
    delete:
      operationId: deleteCliente
      tags: [clienti]
      summary: Elimina cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminato

  /clienti/{id}/storico:
    get:
      operationId: getClienteStorico
      tags: [clienti]
      summary: Storico prenotazioni e contratti di un cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Storico cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteStorico"

  /clienti/{id}/profilo:
    get:
      operationId: getClienteProfilo
      tags: [clienti]
      summary: Profilo completo cliente con statistiche, etichetta e storico dettagliato
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Profilo cliente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteProfilo"

  /clienti/{id}/etichetta:
    patch:
      operationId: updateClienteEtichetta
      tags: [clienti]
      summary: Imposta manualmente l'etichetta di un cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClienteEtichettaBody"
      responses:
        "200":
          description: Etichetta aggiornata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"

  /prenotazioni:
    get:
      operationId: listPrenotazioni
      tags: [prenotazioni]
      summary: Lista prenotazioni
      parameters:
        - name: vetturaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: clienteId
          in: query
          schema:
            type: ["integer", "null"]
        - name: stato
          in: query
          schema:
            type: ["string", "null"]
        - name: dal
          in: query
          schema:
            type: ["string", "null"]
        - name: al
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Lista prenotazioni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prenotazione"
    post:
      operationId: createPrenotazione
      tags: [prenotazioni]
      summary: Crea nuova prenotazione
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrenotazioneBody"
      responses:
        "201":
          description: Prenotazione creata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prenotazione"

  /prenotazioni/{id}:
    get:
      operationId: getPrenotazione
      tags: [prenotazioni]
      summary: Dettaglio prenotazione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prenotazione
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prenotazione"
        "404":
          description: Not found
    patch:
      operationId: updatePrenotazione
      tags: [prenotazioni]
      summary: Aggiorna prenotazione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrenotazioneBody"
      responses:
        "200":
          description: Prenotazione aggiornata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prenotazione"
        "404":
          description: Not found
    delete:
      operationId: deletePrenotazione
      tags: [prenotazioni]
      summary: Elimina prenotazione
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminata

  /contratti:
    get:
      operationId: listContratti
      tags: [contratti]
      summary: Lista contratti
      parameters:
        - name: vetturaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: clienteId
          in: query
          schema:
            type: ["integer", "null"]
        - name: archiviato
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Lista contratti
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contratto"
    post:
      operationId: createContratto
      tags: [contratti]
      summary: Crea nuovo contratto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContrattoBody"
      responses:
        "201":
          description: Contratto creato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contratto"

  /contratti/{id}:
    get:
      operationId: getContratto
      tags: [contratti]
      summary: Dettaglio contratto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contratto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contratto"
        "404":
          description: Not found
    patch:
      operationId: updateContratto
      tags: [contratti]
      summary: Aggiorna/archivia contratto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContrattoBody"
      responses:
        "200":
          description: Contratto aggiornato
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contratto"
        "404":
          description: Not found
    delete:
      operationId: deleteContratto
      tags: [contratti]
      summary: Elimina contratto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Eliminato

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Statistiche generali del portale
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/fleet-status:
    get:
      operationId: getFleetStatus
      tags: [dashboard]
      summary: Stato operativo di ogni veicolo della flotta
      responses:
        "200":
          description: Stato flotta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FleetStatusItem"

  /dashboard/prenotazioni-calendario:
    get:
      operationId: getPrenotazioniCalendario
      tags: [dashboard]
      summary: Prenotazioni formattate per il calendario (per mese)
      parameters:
        - name: anno
          in: query
          schema:
            type: ["integer", "null"]
        - name: mese
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Prenotazioni per calendario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PrenotazioneCalendario"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Vettura:
      type: object
      properties:
        id:
          type: integer
        marca:
          type: string
        modello:
          type: string
        anno:
          type: integer
        targa:
          type: string
        carburante:
          type: string
          description: "benzina | diesel | elettrica | ibrida | gpl"
        stato:
          type: string
          description: "nuova | usata | km0"
        colore:
          type: ["string", "null"]
        prezzo:
          type: ["number", "null"]
        km:
          type: ["integer", "null"]
        disponibile:
          type: boolean
        note:
          type: ["string", "null"]
        foto:
          type: array
          items:
            type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - marca
        - modello
        - anno
        - targa
        - carburante
        - stato
        - disponibile
        - createdAt
        - updatedAt

    CreateVetturaBody:
      type: object
      properties:
        marca:
          type: string
        modello:
          type: string
        anno:
          type: integer
        targa:
          type: string
        carburante:
          type: string
        stato:
          type: string
        colore:
          type: ["string", "null"]
        prezzo:
          type: ["number", "null"]
        km:
          type: ["integer", "null"]
        disponibile:
          type: boolean
        note:
          type: ["string", "null"]
      required:
        - marca
        - modello
        - anno
        - targa
        - carburante
        - stato
        - disponibile

    UpdateVetturaBody:
      type: object
      properties:
        marca:
          type: ["string", "null"]
        modello:
          type: ["string", "null"]
        anno:
          type: ["integer", "null"]
        targa:
          type: ["string", "null"]
        carburante:
          type: ["string", "null"]
        stato:
          type: ["string", "null"]
        colore:
          type: ["string", "null"]
        prezzo:
          type: ["number", "null"]
        km:
          type: ["integer", "null"]
        disponibile:
          type: ["boolean", "null"]
        note:
          type: ["string", "null"]

    VetturaStorico:
      type: object
      properties:
        vettura:
          $ref: "#/components/schemas/Vettura"
        prenotazioni:
          type: array
          items:
            $ref: "#/components/schemas/Prenotazione"
        contratti:
          type: array
          items:
            $ref: "#/components/schemas/Contratto"
      required:
        - vettura
        - prenotazioni
        - contratti

    Manutenzione:
      type: object
      properties:
        id:
          type: integer
        vetturaId:
          type: integer
        tipo:
          type: string
          description: "tagliando | revisione | riparazione | carrozzeria | altro"
        data:
          type: string
          format: date
        costo:
          type: ["number", "null"]
        descrizione:
          type: ["string", "null"]
        prossimaManutenzione:
          type: ["string", "null"]
          format: date
        note:
          type: ["string", "null"]
        vettura:
          $ref: "#/components/schemas/Vettura"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - vetturaId
        - tipo
        - data
        - vettura
        - createdAt
        - updatedAt

    CreateManutenzioneBody:
      type: object
      properties:
        vetturaId:
          type: integer
        tipo:
          type: string
        data:
          type: string
          format: date
        costo:
          type: ["number", "null"]
        descrizione:
          type: ["string", "null"]
        prossimaManutenzione:
          type: ["string", "null"]
          format: date
        note:
          type: ["string", "null"]
      required:
        - vetturaId
        - tipo
        - data

    UpdateManutenzioneBody:
      type: object
      properties:
        vetturaId:
          type: ["integer", "null"]
        tipo:
          type: ["string", "null"]
        data:
          type: ["string", "null"]
        costo:
          type: ["number", "null"]
        descrizione:
          type: ["string", "null"]
        prossimaManutenzione:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    Cliente:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        cognome:
          type: string
        email:
          type: ["string", "null"]
        telefono:
          type: ["string", "null"]
        codiceFiscale:
          type: ["string", "null"]
        indirizzo:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        etichetta:
          type: ["string", "null"]
          description: "affidabile | da_monitorare | problematico"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - nome
        - cognome
        - createdAt
        - updatedAt

    CreateClienteBody:
      type: object
      properties:
        nome:
          type: string
        cognome:
          type: string
        email:
          type: ["string", "null"]
        telefono:
          type: ["string", "null"]
        codiceFiscale:
          type: ["string", "null"]
        indirizzo:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        etichetta:
          type: ["string", "null"]
      required:
        - nome
        - cognome

    UpdateClienteBody:
      type: object
      properties:
        nome:
          type: ["string", "null"]
        cognome:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        telefono:
          type: ["string", "null"]
        codiceFiscale:
          type: ["string", "null"]
        indirizzo:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        etichetta:
          type: ["string", "null"]

    ClienteStorico:
      type: object
      properties:
        cliente:
          $ref: "#/components/schemas/Cliente"
        prenotazioni:
          type: array
          items:
            $ref: "#/components/schemas/Prenotazione"
        contratti:
          type: array
          items:
            $ref: "#/components/schemas/Contratto"
      required:
        - cliente
        - prenotazioni
        - contratti

    Prenotazione:
      type: object
      properties:
        id:
          type: integer
        vetturaId:
          type: integer
        clienteId:
          type: integer
        dataInizio:
          type: string
          format: date
        dataFine:
          type: string
          format: date
        stato:
          type: string
          description: "attiva | completata | annullata | in_corso"
        note:
          type: ["string", "null"]
        dataRientroEffettiva:
          type: ["string", "null"]
          format: date
        kmPartenza:
          type: ["integer", "null"]
        kmRientro:
          type: ["integer", "null"]
        danni:
          type: ["string", "null"]
        prezzoGiornaliero:
          type: ["number", "null"]
        kmInclusi:
          type: ["integer", "null"]
        costoExtraKm:
          type: ["number", "null"]
        cauzione:
          type: ["number", "null"]
        sconto:
          type: ["number", "null"]
        prezzoTotale:
          type: ["number", "null"]
        vettura:
          $ref: "#/components/schemas/Vettura"
        cliente:
          $ref: "#/components/schemas/Cliente"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - vetturaId
        - clienteId
        - dataInizio
        - dataFine
