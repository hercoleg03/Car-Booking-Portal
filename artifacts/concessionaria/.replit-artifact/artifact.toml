kind = "web"
previewPath = "/"
title = "Gestione Prenotazioni Concessionaria"
version = "1.0.0"
id = "artifacts/concessionaria"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20740

[services.development]
run = "pnpm --filter @workspace/concessionaria run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/concessionaria", "run", "build" ]
publicDir = "artifacts/concessionaria/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20740"
BASE_PATH = "/"
